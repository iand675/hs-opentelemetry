_common/lib: !include "../../package-common.yaml"

name:                hs-opentelemetry-instrumentation-wai
version:             0.1.1.0

<<: *preface

extra-source-files:
- README.md
- ChangeLog.md

# Metadata used when publishing your package
synopsis:            WAI instrumentation middleware for OpenTelemetry
category:            OpenTelemetry, Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/iand675/hs-opentelemetry/tree/main/instrumentation/wai#readme>

dependencies:
- base >= 4.7 && < 5

library:
  ghc-options: -Wall
  source-dirs: src
  dependencies:
  - case-insensitive
  - http-types
  - wai
  - hs-opentelemetry-api ^>= 0.4
  - hs-opentelemetry-semantic-conventions >= 1.40 && < 2
  - vault
  - text
  - network
  - iproute
  - unordered-containers

tests:
  hs-opentelemetry-instrumentation-wai-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - hs-opentelemetry-instrumentation-wai >= 0.1 && < 0.2
    - hs-opentelemetry-api == 0.4.*
    - hs-opentelemetry-sdk == 0.1.*
    - hs-opentelemetry-exporter-in-memory == 0.0.*
    - hspec
    - text
    - wai
    - http-types
    - vault
    - network
    - unordered-containers
