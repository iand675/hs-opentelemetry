- amazonka-2.0
- amazonka-core-2.0
- amazonka-sso-2.0
- amazonka-sts-2.0

flags:
  postgresql-libpq:
    use-pkg-config: true

nix:
  enable: true
  packages: [libffi, mysql80, openssl, pcre, pkg-config, postgresql, protobuf, rdkafka, zlib, zstd]
