resolver: lts-21.25

# NOTE: hs-opentelemetry-otlp now generates its OTLP wire types with
# wireform-proto, whose wireform-core dependency requires base >= 4.18
# (GHC 9.6+). That rules out GHC 9.4 for hs-opentelemetry-otlp,
# hs-opentelemetry-exporter-otlp, and — because the SDK uses the OTLP exporter
# as its default exporter — hs-opentelemetry-sdk and everything that depends on
# it. Those packages are excluded from this resolver below.
packages:
- api-types
- api
# sdk excluded (GHC 9.6+): depends on hs-opentelemetry-exporter-otlp.
# - sdk
# otlp excluded (GHC 9.6+): wireform-core needs base >= 4.18.
# - otlp
- semantic-conventions
- exporters/handle
- exporters/in-memory
# exporters/otlp excluded (GHC 9.6+): depends on hs-opentelemetry-otlp.
# - exporters/otlp
- exporters/prometheus
- propagators/b3
- propagators/jaeger
- propagators/xray
- propagators/datadog
- propagators/w3c
# amazonka excluded: instrumentation/amazonka has API compatibility issues (toBS, abbrev ambiguity)
# The following instrumentation packages depend on hs-opentelemetry-sdk and are
# therefore excluded on GHC 9.4 (see the note above):
# - instrumentation/cloudflare
# - instrumentation/conduit
# - instrumentation/hspec
# - instrumentation/http-client
# - instrumentation/wai
# - instrumentation/yesod
- instrumentation/co-log
- instrumentation/ghc-metrics
# hw-kafka-client excluded: LTS 21 version lacks headers API
- instrumentation/katip
- instrumentation/monad-logger
- instrumentation/persistent
- instrumentation/persistent-mysql
- instrumentation/postgresql-simple
- instrumentation/tasty
# utils/exceptions excluded (GHC 9.6+): depends on hs-opentelemetry-sdk.
# - utils/exceptions
# examples depend on the SDK and/or the OTLP exporter (GHC 9.6+):
# - examples/hspec
# - examples/otlp-demo
# - examples/yesod-minimal
# hw-kafka-client-example excluded: requires hw-kafka-client with headers API

extra-deps:
- unix-compat-0.7.1@sha256:bd5bb4e04b2ed707f3e3466470a452354310389506cf0a7a73bf10e4d533f6d1,3619
- thread-utils-context-0.4.1.0
- thread-utils-finalizers-0.1.1.0
- tasty-1.5.3@sha256:6b5dda3f16db1274a0b3e6c4073ac57172a1e96b1dca05666c5cbd1183639412,2923
- postgresql-libpq-pkgconfig-0.11@sha256:9d6edd8ee105cfe7145b138c8f8bf582cddbd13af36c4302aeff891003efdc6f,1270
# co-log 0.6.1.2 is not in LTS 21
- co-log-0.6.1.2@sha256:86d61e07356a5cb45b8ec28217b579a21f555d025dc0d9e1eecd9ff8d288f6fc,6512

allow-newer: true
allow-newer-deps:
- co-log
- thread-utils-context

flags:
  postgresql-libpq:
    use-pkg-config: true

nix:
  enable: true
  packages: [libffi, mysql84, openssl, pcre, pkg-config, postgresql, protobuf, rdkafka, zlib, zstd]
