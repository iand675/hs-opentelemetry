name: hspec-example

dependencies:
- base >= 4.7 && < 5

ghc-options:
  - -Wall

tests:
  test:
    dependencies:
      # minimal example dependencies
      - hspec
      - hspec-example
      - text
      - unliftio
      # opentelemetry dependencies
      - hs-opentelemetry-sdk == 0.1.*
      - hs-opentelemetry-api == 0.4.*
      - hs-opentelemetry-exporter-handle >= 0.0.1 && < 0.1
      - hs-opentelemetry-instrumentation-hspec >= 0.0.1 && < 0.1
    main: Main.hs
    source-dirs:
      - test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N

library:
  source-dirs: src
