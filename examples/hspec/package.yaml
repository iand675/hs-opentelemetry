name: hspec-example

dependencies:
- base >= 4.7 && < 5

ghc-options:
  - -Wall

tests:
  test:
    dependencies:
      # minimal example dependencies
      - hspec
      - hspec-example
      - text
      - unliftio
      # opentelemetry dependencies
      - hs-opentelemetry-sdk ^>= 1.0
      - hs-opentelemetry-api ^>= 1.0
      - hs-opentelemetry-exporter-handle ^>= 1.0
      - hs-opentelemetry-instrumentation-hspec ^>= 1.0
    main: Main.hs
    source-dirs:
      - test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N

library:
  source-dirs: src
