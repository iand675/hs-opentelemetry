_common/lib: !include "../../package-common.yaml"

name:                hs-opentelemetry-utils-exceptions
version:             1.0.0.0

<<: *preface

extra-source-files:
- README.md
- ChangeLog.md

# Metadata used when publishing your package
synopsis: Exception utilities for OpenTelemetry instrumentation
category: OpenTelemetry, Telemetry, Error Handling

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/iand675/hs-opentelemetry/tree/main/utils/exceptions#readme>

dependencies:
- base >= 4.7 && < 5

library:
  source-dirs: src
  dependencies:
  - hs-opentelemetry-api ^>= 1.0
  - hs-opentelemetry-sdk ^>= 1.0
  - text
  - exceptions

tests:
  exceptions-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - hs-opentelemetry-utils-exceptions ^>= 1.0
    - hs-opentelemetry-api ^>= 1.0
    - hs-opentelemetry-sdk ^>= 1.0
    - hs-opentelemetry-exporter-in-memory ^>= 1.0
    - hspec
    - text
